name: One-shot fix mobile simulator anyhow import

on:
  push:
    branches:
      - codex/fix-desktop-windows-build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/fix-desktop-windows-build
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply import fix and remove one-shot workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/jcode-mobile-sim/src/lib.rs')
          text = path.read_text()
          old = 'use anyhow::{Result, bail};'
          new = 'use anyhow::{Result, anyhow, bail};'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/fix-anyhow-mobile.yml

      - name: Commit fix
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/jcode-mobile-sim/src/lib.rs .github/workflows/fix-anyhow-mobile.yml
          git commit -m "Import anyhow macro in mobile simulator"
          git push origin HEAD:codex/fix-desktop-windows-build
