name: Rust CI

on:
  push:
    branches:
      - codex/fix-desktop-windows-build
  workflow_dispatch:

defaults:
  run:
    shell: powershell

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI_TRIGGER_NOTE: self-hosted-windows-powershell

jobs:
  check:
    name: Check workspace
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: |
          cargo --version
          rustc --version

      - name: Cargo check workspace
        run: cargo check --workspace --all-targets

  debate-tests:
    name: Debate crates tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: |
          cargo --version
          rustc --version

      - name: Test debate core
        run: cargo test -p jcode-debate-core

      - name: Test debate orchestrator
        run: cargo test -p jcode-debate-orchestrator

  desktop-tests:
    name: Desktop crate tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: |
          cargo --version
          rustc --version

      - name: Test desktop crate
        run: cargo test -p jcode-desktop
