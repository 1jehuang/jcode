name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  CARGO_INCREMENTAL: "0"

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create release if missing
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-linux-macos:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: jcode-linux-x86_64
            compat_container: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: jcode-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: jcode-macos-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: jcode-macos-x86_64

    steps:
      - uses: actions/checkout@v4
      - name: Get rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p dist
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/jcode dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
        env:
          JCODE_RELEASE_BUILD: "1"
          JCODE_BUILD_SEMVER: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

      - name: Publish asset to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "dist/${{ matrix.artifact }}.tar.gz" --clobber

  build-windows:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: jcode-windows-x86_64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: jcode-windows-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: pwsh
        run: |
          cargo build --release --target ${{ matrix.target }}
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/jcode.exe" "dist/${{ matrix.artifact }}.exe"
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}.exe"
        env:
          JCODE_RELEASE_BUILD: "1"
          JCODE_BUILD_SEMVER: ${{ github.ref_name }}

      - name: Verify launched
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/jcode.exe" --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz

      - name: Publish asset to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${env:GITHUB_REF_NAME}" "dist/${{ matrix.artifact }}.tar.gz" --clobber

  release:
    name: Finalize release
    needs: [build-linux-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: jcode-*

      - name: Generate checksums
        shell: bash
        run: |
          python3 - << 'PY'
          import hashlib
          from pathlib import Path
          files = sorted(
              p for p in Path("artifacts").rglob("*")
              if p.is_file() and (p.name.endswith(".tar.gz") or p.name.endswith(".exe"))
          )
          if not files:
            raise SystemExit("No release assets found for checksum generation")
          with Path("SHA256SUMS").open("w", encoding="utf-8") as out:
            for path in files:
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              out.write(f"{digest}  {path.name}\n")
          PY
          cat SHA256SUMS

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS --clobber
