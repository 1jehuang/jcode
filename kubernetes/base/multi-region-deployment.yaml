    - port: 8081
      targetPort: 8081
      name: rest
  selector:
    app: jcode-server
    region: eu-west-1

---
# JCode Server Deployment - Asia Pacific
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcode-server
  namespace: carpai-ap-southeast
  labels:
    app: jcode-server
    region: ap-southeast-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jcode-server
      region: ap-southeast-1
  template:
    metadata:
      labels:
        app: jcode-server
