              value: "ap-southeast-1"
            - name: CLUSTER_NAME
              value: "carpai-ap-southeast"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: ap-southeast-url
            - name: REDIS_URL
              valueFrom:
