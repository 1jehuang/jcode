# Cross-Region Multi-Active Deployment Architecture
# Supports active-active deployment across multiple geographic regions
# with CRDT-based data synchronization and GSLB routing

---
# Region A - US East (Primary)
apiVersion: v1
kind: Namespace
metadata:
  name: carpai-us-east
  labels:
    region: us-east-1
    environment: production
---
# Region B - EU West (Secondary)
apiVersion: v1
kind: Namespace
metadata:
  name: carpai-eu-west
  labels:
    region: eu-west-1
    environment: production
---
# Region C - Asia Pacific (Tertiary)
apiVersion: v1
kind: Namespace
metadata:
  name: carpai-ap-southeast
  labels:
    region: ap-southeast-1
    environment: production

---
# Global Traffic Manager Configuration (GSLB)
# Routes traffic based on latency and load
apiVersion: v1
kind: ConfigMap
metadata:
  name: gslb-config
  namespace: carpai-us-east
data:
  routing-strategy: "latency-load-balanced"
  health-check-interval: "10s"
  failover-threshold: "3"
  regions: |
    {
      "us-east-1": {
        "endpoint": "carpai-us.example.com",
        "weight": 50,
        "priority": 1,
        "health_check": "/healthz"
      },
      "eu-west-1": {
        "endpoint": "carpai-eu.example.com",
        "weight": 30,
        "priority": 2,
        "health_check": "/healthz"
      },
      "ap-southeast-1": {
        "endpoint": "carpai-ap.example.com",
        "weight": 20,
        "priority": 3,
        "health_check": "/healthz"
      }
    }

---
# JCode Server Deployment - US East
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcode-server
  namespace: carpai-us-east
  labels:
    app: jcode-server
    region: us-east-1
spec:
  replicas: 5
  selector:
    matchLabels:
      app: jcode-server
      region: us-east-1
  template:
    metadata:
      labels:
        app: jcode-server
        region: us-east-1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - jcode-server
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: jcode-server
          image: jcode:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: websocket
            - containerPort: 8081
              name: rest
            - containerPort: 9090
              name: metrics
          env:
            - name: REGION
              value: "us-east-1"
            - name: CLUSTER_NAME
              value: "carpai-us-east"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: us-east-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: us-east-url
            - name: CROSS_REGION_SYNC_ENABLED
              value: "true"
            - name: CRDT_SYNC_INTERVAL_MS
              value: "5000"
            - name: ANTI_ENTROPY_INTERVAL_SEC
              value: "60"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 16Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
# JCode Server Service - US East
apiVersion: v1
kind: Service
metadata:
  name: jcode-server
  namespace: carpai-us-east
  labels:
    app: jcode-server
    region: us-east-1
spec:
  type: LoadBalancer
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 8080
      targetPort: 8080
      name: websocket
    - port: 8081
      targetPort: 8081
      name: rest
  selector:
    app: jcode-server
    region: us-east-1

---
# JCode Server Deployment - EU West
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcode-server
  namespace: carpai-eu-west
  labels:
    app: jcode-server
