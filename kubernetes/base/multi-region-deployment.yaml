---
# JCode Server Service - EU West
apiVersion: v1
kind: Service
metadata:
  name: jcode-server
  namespace: carpai-eu-west
  labels:
    app: jcode-server
    region: eu-west-1
spec:
  type: LoadBalancer
  ports:
    - port: 50051
