# PostgreSQL + pgvector StatefulSet
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: carpai
data:
  POSTGRES_DB: carpai
  POSTGRES_USER: carpai
  POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
  POSTGRES_SHARED_PRELOAD_LIBRARIES: "vector"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: carpai
type: Opaque
stringData:
  POSTGRES_PASSWORD: "carpai_dev_password"  # Change in production!
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: carpai
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - carpai
                - -d
                - carpai
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - psql
                - -U
                - carpai
                - -d
                - carpai
                - -c
                - SELECT extname FROM pg_extension WHERE extname = 'vector';
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: carpai
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
