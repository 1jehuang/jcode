# Enhanced Horizontal Pod Autoscaler for 500 concurrent users
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jcode-server-hpa
  namespace: carpai
  labels:
    app: jcode-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jcode-server
  minReplicas: 5
  maxReplicas: 50
  metrics:
    # Scale based on active sessions (primary metric)
    - type: Pods
      pods:
        metric:
          name: active_sessions
        target:
          averageValue: "50"  # Scale when avg 50 sessions per pod
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Scale based on custom metric: requests per second
    - type: Object
      object:
        metric:
          name: http_requests_per_second
        describedObject:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          name: jcode-server-ingress
        target:
          type: AverageValue
          averageValue: "1000"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
        - type: Percent
          value: 10
          periodSeconds: 120
---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jcode-server-pdb
  namespace: carpai
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: jcode-server
---
# Updated Deployment with enhanced resources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jcode-server
  namespace: carpai
  labels:
    app: jcode-server
spec:
  replicas: 5  # Initial replicas matching HPA minReplicas
  selector:
    matchLabels:
      app: jcode-server
  template:
    metadata:
      labels:
        app: jcode-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - jcode-server
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: jcode-server
          image: jcode:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: websocket
            - containerPort: 8081
              name: rest
            - containerPort: 9090
              name: metrics
          env:
            - name: JCODE_GRPC_PORT
              value: "50051"
            - name: JCODE_WS_PORT
              value: "8080"
            - name: JCODE_REST_PORT
              value: "8081"
            - name: JCODE_BIND_ADDR
              value: "0.0.0.0"
            - name: RUST_LOG
              value: "jcode=info,jcode_enterprise_server=debug"
            - name: DATABASE_URL
              value: "postgresql://carpai:carpai_dev_password@postgres:5432/carpai"
            - name: VECTOR_STORE_TYPE
              value: "pgvector"
            - name: REDIS_MODE
              value: "cluster"
            - name: REDIS_URL
              value: "redis://redis-node-0.redis-node:6379,redis://redis-node-1.redis-node:6379,redis://redis-node-2.redis-node:6379,redis://redis-node-3.redis-node:6379,redis://redis-node-4.redis-node:6379,redis://redis-node-5.redis-node:6379"
            - name: KV_CACHE_STORAGE_TYPE
              value: "nvme"
            - name: KV_CACHE_STORAGE_PATH
              value: "/data/kv_cache"
            - name: KV_CACHE_TTL_SECS
              value: "3600"
            - name: LOAD_BALANCER_STRATEGY
              value: "three_layer"
            - name: TENANT_ISOLATION_ENABLED
              value: "true"
            - name: MODEL_ROUTING_ENABLED
              value: "true"
            - name: SESSION_STICKY_ENABLED
              value: "true"
            - name: SESSION_STICKY_TTL_SECS
              value: "3600"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jcode-secret
                  key: jwt-secret
            - name: MAX_CONCURRENT_SESSIONS
              value: "100"
            - name: BACKPRESSURE_THRESHOLD
              value: "80"
            - name: ENABLE_DYNAMIC_BACKPRESSURE
              value: "true"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 16Gi
          volumeMounts:
            - name: jcode-data
              mountPath: /home/jcode/.jcode
            - name: config-volume
              mountPath: /home/jcode/.jcode/config.toml
              subPath: config.toml
              readOnly: true
            - name: kv-cache
              mountPath: /data/kv_cache
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
      volumes:
        - name: jcode-data
          persistentVolumeClaim:
            claimName: jcode-data-pvc
        - name: config-volume
          configMap:
            name: jcode-config
        - name: kv-cache
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
