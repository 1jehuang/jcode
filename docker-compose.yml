version: "3.8"

services:
  # CarpAI Server
  carpai-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # REST API
      - "50051:50051" # gRPC
    environment:
      - CARPAI_SERVER__PORT=8080
      - CARPAI_SERVER__LISTEN_ADDR=0.0.0.0
      - CARPAI_SERVER__JWT_SECRET=${CARPAI_JWT_SECRET:-change-me-in-production}
      - CARPAI_SERVER__DATABASE_URL=postgres://carpai:${DB_PASSWORD}@db:5432/carpai
      - RUST_LOG=info
    volumes:
      - carpai-data:/var/lib/carpai/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=carpai
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
      - POSTGRES_DB=carpai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus (optional - for metrics collection)
  prometheus:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # Grafana (optional - for dashboards)
  grafana:
    image: grafana/grafana:latest
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  carpai-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
