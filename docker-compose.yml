# ============================================================
# JCode — Docker Compose 部署
#
# 启动: docker compose up -d
# 停止: docker compose down
# 日志: docker compose logs -f jcode-server
# ============================================================

services:
  # ── PostgreSQL (审计日志、用户数据) ──
  postgres:
    image: postgres:15-alpine
    container_name: carpai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carpai
      POSTGRES_USER: carpai
      POSTGRES_PASSWORD: carpai_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpai -d carpai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - carpai-net
    profiles:
      - dev
      - enterprise

  # ── Redis (会话共享、速率限制、缓存) ──
  redis:
    image: redis:7-alpine
    container_name: carpai-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carpai-net
    profiles:
      - dev
      - enterprise

  jcode-server:
    image: jcode:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jcode-server
    restart: unless-stopped
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # WebSocket
      - "8081:8081"     # REST
    environment:
      - JCODE_GRPC_PORT=50051
      - JCODE_WS_PORT=8080
      - JCODE_REST_PORT=8081
      - JCODE_BIND_ADDR=0.0.0.0
      - RUST_LOG=jcode=info
      # Database
      - DATABASE_URL=postgresql://carpai:carpai_dev_password@postgres:5432/carpai
      # Redis
      - REDIS_URL=redis://redis:6379
      # JWT
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_secure_random_string_at_least_32_chars}
      - JWT_EXPIRATION_HOURS=24
      # OAuth2
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:8080/oauth/callback}
      # Audit
      - AUDIT_RETENTION_DAYS=90
      - AUDIT_MAX_EVENTS=100000
      - AUDIT_LOG_PII=false
      # OTLP Metrics (可选, 需要 OTEL Collector)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=jcode-server
    volumes:
      - jcode-data:/home/jcode/.jcode
      - ./config.toml:/home/jcode/.jcode/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "jcode", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - carpai-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 1G
    profiles:
      - default
      - enterprise

  # ── 可选: OTel Collector (Metrics/Traces 收集) ──
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    profiles:
      - monitoring
    command:
      - "--config=/etc/otel-collector-config.yaml"
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"     # OTLP HTTP
      - "4317:4317"     # OTLP gRPC
    networks:
      - jcode-net

  # ── 可选: Prometheus (指标存储) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - jcode-net

  # ── 可选: Grafana (指标可视化) ──
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=jcode
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./deploy/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/jcode.json:ro
      - ./deploy/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - jcode-net
    depends_on:
      - prometheus

volumes:
  jcode-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  carpai-net:
    driver: bridge
  jcode-net:
    driver: bridge
