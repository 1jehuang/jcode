[package]
name = "jcode-project-builder"
version = "0.1.0"
edition = "2021"
description = "Project builder — Builder pattern: scaffold code + Dockerfile + CI/CD scripts"

[dependencies]
tokio = { workspace = true, features = ["fs"] }
serde = { workspace = true, features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
regex = "1"
jcode-ci-generator = { path = "../jcode-ci-generator" }
