syntax = "proto3";

package carpai.agent;

// Agent service for chat completions and conversation management
service AgentService {
  // Chat completion (OpenAI compatible)
  rpc ChatCompletion (ChatCompletionRequest) returns (ChatCompletionResponse);
  
  // Streaming chat completion
  rpc ChatCompletionStream (ChatCompletionRequest) returns (stream ChatCompletionChunk);
  
  // Append message to session
  rpc AppendMessage (AppendMessageRequest) returns (AppendMessageResponse);
  
  // Get session messages
  rpc GetSessionMessages (GetSessionMessagesRequest) returns (GetSessionMessagesResponse);
}

message ChatCompletionRequest {
  string model = 1;
  repeated ChatMessage messages = 2;
  optional double temperature = 3;
  optional int32 max_tokens = 4;
  optional bool stream = 5;
  optional string session_id = 6;
  map<string, string> metadata = 7;
}

message ChatMessage {
  string role = 1;  // "user", "assistant", "system", "tool"
  string content = 2;
  optional string name = 3;
  optional ToolCall tool_call = 4;
  optional string tool_call_id = 5;
}

message ToolCall {
  string id = 1;
  string type = 2;  // "function"
  FunctionCall function = 3;
}

message FunctionCall {
  string name = 1;
  string arguments = 2;  // JSON string
}

message ChatCompletionResponse {
  string id = 1;
  string object = 2;  // "chat.completion"
  int64 created = 3;
  string model = 4;
  repeated ChatChoice choices = 5;
  UsageInfo usage = 6;
}

message ChatChoice {
  int32 index = 1;
  optional ChatMessage message = 2;
  optional string finish_reason = 3;
}

message ChatCompletionChunk {
  string id = 1;
  string object = 2;  // "chat.completion.chunk"
  int64 created = 3;
  string model = 4;
  repeated ChunkChoice choices = 5;
}

message ChunkChoice {
  int32 index = 1;
  optional DeltaContent delta = 2;
  optional string finish_reason = 3;
}

message DeltaContent {
  optional string role = 1;
  optional string content = 2;
  optional ToolCallDelta tool_calls = 3;
}

message ToolCallDelta {
  string id = 1;
  optional FunctionCallDelta function = 2;
}

message FunctionCallDelta {
  optional string name = 1;
  optional string arguments = 2;
}

message UsageInfo {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message AppendMessageRequest {
  string session_id = 1;
  ChatMessage message = 2;
}

message AppendMessageResponse {
  bool success = 1;
  string message_id = 2;
}

message GetSessionMessagesRequest {
  string session_id = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
}

message GetSessionMessagesResponse {
  repeated ChatMessage messages = 1;
  int32 total = 2;
}
