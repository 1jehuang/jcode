syntax = "proto3";

package carpai.session;

// Session management service
service SessionService {
  // Create a new session
  rpc CreateSession (CreateSessionRequest) returns (SessionResponse);
  
  // Get session details
  rpc GetSession (GetSessionRequest) returns (SessionResponse);
  
  // List sessions
  rpc ListSessions (ListSessionsRequest) returns (ListSessionsResponse);
  
  // Delete session
  rpc DeleteSession (DeleteSessionRequest) returns (DeleteSessionResponse);
  
  // Update session metadata
  rpc UpdateSession (UpdateSessionRequest) returns (SessionResponse);
}

message CreateSessionRequest {
  string title = 1;
  optional string model = 2;
  map<string, string> metadata = 3;
  optional string tenant_id = 4;
}

message GetSessionRequest {
  string session_id = 1;
}

message ListSessionsRequest {
  optional int32 limit = 1;
  optional int32 offset = 2;
  optional string status = 3;  // "active", "archived", "all"
  optional string tenant_id = 4;
}

message DeleteSessionRequest {
  string session_id = 1;
}

message UpdateSessionRequest {
  string session_id = 1;
  optional string title = 2;
  map<string, string> metadata = 3;
  optional string status = 4;
}

message SessionResponse {
  string id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
  string status = 5;
  optional string model = 6;
  map<string, string> metadata = 7;
  int32 message_count = 8;
  optional string tenant_id = 9;
}

message ListSessionsResponse {
  repeated SessionResponse sessions = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message DeleteSessionResponse {
  bool success = 1;
}
