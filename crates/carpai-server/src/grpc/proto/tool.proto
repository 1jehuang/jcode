syntax = "proto3";

package carpai.tool;

// Tool execution service
service ToolService {
  // Execute a tool
  rpc ExecuteTool (ExecuteToolRequest) returns (ExecuteToolResponse);
  
  // List available tools
  rpc ListTools (ListToolsRequest) returns (ListToolsResponse);
  
  // Get tool definition
  rpc GetToolDefinition (GetToolDefinitionRequest) returns (ToolDefinition);
}

message ExecuteToolRequest {
  string tool_name = 1;
  string arguments = 2;  // JSON string
  optional string session_id = 3;
  optional int64 timeout_ms = 4;
}

message ExecuteToolResponse {
  bool success = 1;
  string output = 2;
  optional string error = 3;
  int64 duration_ms = 4;
  map<string, string> metadata = 5;
}

message ListToolsRequest {
  optional string category = 1;
}

message ListToolsResponse {
  repeated ToolDefinition tools = 1;
}

message GetToolDefinitionRequest {
  string tool_name = 1;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string schema = 3;  // JSON Schema as string
  string category = 4;
  bool requires_approval = 5;
  repeated string tags = 6;
}
