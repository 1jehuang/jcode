[package]
name = "jcode-multi-file-edit"
version = "0.1.0"
edition = "2021"
description = "Multi-file atomic edit engine — parallel AST processing, dependency-aware diffs, Composer-style atomic commits"

[dependencies]
tokio = { workspace = true, features = ["sync", "process", "fs", "rt", "macros"] }
serde = { workspace = true, features = ["derive"] }
serde_json = "1"
similar = "2"
anyhow = "1"
tracing = "0.1"
parking_lot = "0.12"
uuid = { workspace = true }
futures = "0.3"
jcode-plan = { path = "../jcode-plan" }
jcode-swarm-core = { path = "../jcode-swarm-core" }
