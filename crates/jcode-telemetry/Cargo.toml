[package]
name = "jcode-telemetry"
version.workspace = true
edition.workspace = true
description = "性能监控与诊断系统 - 移植自 Claude Code: OTel遥测/延迟分解/Token追踪/资源监控"
authors.workspace = true
license.workspace = true

[dependencies]
# Async runtime
tokio = { workspace = true, features = ["full", "sync", "time"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# OpenTelemetry (Rust native)
opentelemetry = { version = "0.27", features = ["metrics", "trace"] }
opentelemetry_sdk = { version = "0.27", default-features = false, features = ["metrics", "trace", "rt-tokio"] }

# Optional exporters
# opentelemetry-otlp = { version = "0.27", optional = true }  # OTLP gRPC exporter
# opentelemetry-prometheus = { version = "0.17", optional = true }  # Prometheus

# Metrics recording
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", optional = true }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-opentelemetry = "0.28"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# System info (for resource monitoring)
sysinfo = "0.32"

# Hash
sha2 = "0.10"

# Internal crates
jcode-types = { path = "../jcode-types" }
jcode-config-types = { path = "../jcode-config-types" }

[features]
default = []
otlp = []  # Enable OTLP export
prometheus = ["metrics-exporter-prometheus"]
full = ["otlp", "prometheus"]

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

# [[bench]]
# name = "telemetry_bench"
# harness = false
# path = "benches/telemetry_bench.rs"
