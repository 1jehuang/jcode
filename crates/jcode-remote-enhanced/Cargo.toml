[package]
name = "jcode-remote-enhanced"
version = "0.1.0"
edition = "2024"
publish = false

description = "Remote debugging enhancements for JCode - ported from Claude Code remoteBridgeCore.ts, SessionsWebSocket.ts, RemoteSessionManager.ts"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP & WebSocket
reqwest = { version = "0.12", features = ["json"] }
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "rustls-tls-native-roots"] }

# Utilities
uuid = { version = "1", features = ["v4", "v7"] }
anyhow = "1"
thiserror = "1"
tracing = "1"
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22"
sha2 = "0.10"
rand = "0.9"
url = "2"

# Crypto (JWT)
jsonwebtoken = "9"
