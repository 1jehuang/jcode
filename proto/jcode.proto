syntax = "proto3";

package jcode;

import "google/protobuf/struct.proto";

option go_package = "github.com/1jehuang/jcode/proto";
option java_multiple_files = true;
option java_package = "com.jcode";
option java_outer_classname = "JcodeProto";

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

message CreateSessionRequest {
  string workspace_name = 1;
  string workspace_path = 2;
  string tenant_id = 3;
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  string session_id = 1;
  string tenant_id = 2;
}

message GetSessionResponse {
  Session session = 1;
}

message UpdateSessionRequest {
  string session_id = 1;
  string tenant_id = 2;
  SessionStatus status = 3;
}

message UpdateSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {
  string session_id = 1;
  string tenant_id = 2;
}

message DeleteSessionResponse {
  bool success = 1;
}

message ListSessionsRequest {
  string tenant_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListSessionsResponse {
  repeated Session sessions = 1;
  string next_page_token = 2;
}

message Session {
  string id = 1;
  string workspace_name = 2;
  string workspace_path = 3;
  SessionStatus status = 4;
  string tenant_id = 5;
  string created_at = 6;
  string last_active_at = 7;
  int32 context_tokens = 8;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_ACTIVE = 1;
  SESSION_STATUS_IDLE = 2;
  SESSION_STATUS_SUSPENDED = 3;
  SESSION_STATUS_TERMINATED = 4;
}

service ChatService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatStreamRequest) returns (stream ChatStreamResponse);
  rpc CancelChat(CancelChatRequest) returns (CancelChatResponse);
}

message ChatRequest {
  string session_id = 1;
  string tenant_id = 2;
  repeated Message messages = 3;
  string model = 4;
  float temperature = 5;
  int32 max_tokens = 6;
  repeated Tool tools = 7;
}

message ChatResponse {
  string id = 1;
  string model = 2;
  string content = 3;
  Usage usage = 4;
  repeated ToolCall tool_calls = 5;
}

message ChatStreamRequest {
  string session_id = 1;
  string tenant_id = 2;
  repeated Message messages = 3;
  string model = 4;
  float temperature = 5;
  int32 max_tokens = 6;
  repeated Tool tools = 7;
}

message ChatStreamResponse {
  string id = 1;
  string model = 2;
  string content = 3;
  bool done = 4;
  Usage usage = 5;
  repeated ToolCall tool_calls = 6;
}

message CancelChatRequest {
  string session_id = 1;
  string tenant_id = 2;
}

message CancelChatResponse {
  bool success = 1;
}

message Message {
  string role = 1;
  string content = 2;
  repeated MessagePart parts = 3;
}

message MessagePart {
  oneof content {
    string text = 1;
    ImageContent image = 2;
    FileContent file = 3;
  }
}

message ImageContent {
  string url = 1;
  string format = 2;
}

message FileContent {
  string path = 1;
  string content = 2;
}

message Tool {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;
}

message ToolCall {
  string tool_name = 1;
  google.protobuf.Struct arguments = 2;
}

message Usage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

service MemoryService {
  rpc AddMemory(AddMemoryRequest) returns (AddMemoryResponse);
  rpc RetrieveMemory(RetrieveMemoryRequest) returns (RetrieveMemoryResponse);
  rpc ClearMemory(ClearMemoryRequest) returns (ClearMemoryResponse);
}

message AddMemoryRequest {
  string session_id = 1;
  string tenant_id = 2;
  string content = 3;
  float importance = 4;
  string context = 5;
  MemoryType memory_type = 6;
}

message AddMemoryResponse {
  MemoryEntry entry = 1;
}

message RetrieveMemoryRequest {
  string session_id = 1;
  string tenant_id = 2;
  string query = 3;
  int32 limit = 4;
}

message RetrieveMemoryResponse {
  repeated MemoryEntry entries = 1;
}

message ClearMemoryRequest {
  string session_id = 1;
  string tenant_id = 2;
}

message ClearMemoryResponse {
  bool success = 1;
}

message MemoryEntry {
  string id = 1;
  string content = 2;
  float importance = 3;
  string context = 4;
  MemoryType memory_type = 5;
  string created_at = 6;
}

enum MemoryType {
  MEMORY_TYPE_UNSPECIFIED = 0;
  MEMORY_TYPE_FACT = 1;
  MEMORY_TYPE_PREFERENCE = 2;
  MEMORY_TYPE_ENTITY = 3;
  MEMORY_TYPE_CORRECTION = 4;
}

service AgentService {
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse);
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
}

message CreateAgentRequest {
  string session_id = 1;
  string tenant_id = 2;
  string name = 3;
  AgentRole role = 4;
}

message CreateAgentResponse {
  Agent agent = 1;
}

message AssignTaskRequest {
  string agent_id = 1;
  string tenant_id = 2;
  string task_description = 3;
  TaskPriority priority = 4;
}

message AssignTaskResponse {
  Agent agent = 1;
}

message GetAgentRequest {
  string agent_id = 1;
  string tenant_id = 2;
}

message GetAgentResponse {
  Agent agent = 1;
}

message ListAgentsRequest {
  string session_id = 1;
  string tenant_id = 2;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
}

message Agent {
  string id = 1;
  string name = 2;
  AgentRole role = 3;
  AgentStatus status = 4;
  string session_id = 5;
  string tenant_id = 6;
}

enum AgentRole {
  AGENT_ROLE_UNSPECIFIED = 0;
  AGENT_ROLE_COORDINATOR = 1;
  AGENT_ROLE_WORKER = 2;
  AGENT_ROLE_SPECIALIST = 3;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_IDLE = 1;
  AGENT_STATUS_WORKING = 2;
  AGENT_STATUS_WAITING = 3;
  AGENT_STATUS_COMPLETED = 4;
}

enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  TASK_PRIORITY_LOW = 1;
  TASK_PRIORITY_MEDIUM = 2;
  TASK_PRIORITY_HIGH = 3;
  TASK_PRIORITY_URGENT = 4;
}

service ToolService {
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
}

message ExecuteToolRequest {
  string session_id = 1;
  string tenant_id = 2;
  string tool_name = 3;
  google.protobuf.Struct parameters = 4;
}

message ExecuteToolResponse {
  bool success = 1;
  string output = 2;
}

message ListToolsRequest {
  string tenant_id = 1;
}

message ListToolsResponse {
  repeated ToolInfo tools = 1;
}

message ToolInfo {
  string name = 1;
  string description = 2;
  google.protobuf.Struct input_schema = 3;
}

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);
}

message CreateTenantRequest {
  string name = 1;
  string domain = 2;
  TenantLimits limits = 3;
}

message CreateTenantResponse {
  Tenant tenant = 1;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  Tenant tenant = 1;
}

message UpdateTenantRequest {
  string tenant_id = 1;
  string name = 2;
  TenantLimits limits = 3;
}

message UpdateTenantResponse {
  Tenant tenant = 1;
}

message DeleteTenantRequest {
  string tenant_id = 1;
}

message DeleteTenantResponse {
  bool success = 1;
}

message Tenant {
  string id = 1;
  string name = 2;
  string domain = 3;
  TenantLimits limits = 4;
  string created_at = 5;
}

message TenantLimits {
  int32 max_sessions = 1;
  int32 max_agents_per_session = 2;
  int32 max_tokens_per_request = 3;
}

service JoyCodeService {
  rpc GeneratePatch(GeneratePatchRequest) returns (GeneratePatchResponse);
  rpc ReviewCode(ReviewCodeRequest) returns (ReviewCodeResponse);
  rpc GenerateTests(GenerateTestsRequest) returns (GenerateTestsResponse);
  rpc ApplyPatch(ApplyPatchRequest) returns (ApplyPatchResponse);
}

message GeneratePatchRequest {
  string session_id = 1;
  string tenant_id = 2;
  string problem_description = 3;
  string repository_path = 4;
  repeated string target_files = 5;
  string model = 6;
}

message GeneratePatchResponse {
  string patch_id = 1;
  repeated Patch candidates = 2;
  string summary = 3;
}

message Patch {
  string id = 1;
  string diff = 2;
  string description = 3;
  float confidence = 4;
  repeated CodeChange changes = 5;
}

message CodeChange {
  string file_path = 1;
  string change_type = 2;
  int32 start_line = 3;
  int32 end_line = 4;
  string original_code = 5;
  string modified_code = 6;
}

message ReviewCodeRequest {
  string session_id = 1;
  string tenant_id = 2;
  repeated string files = 3;
  string repository_path = 4;
  ReviewMode mode = 5;
}

message ReviewCodeResponse {
  string review_id = 1;
  repeated CodeReview reviews = 2;
  string overall_feedback = 3;
}

message CodeReview {
  string file_path = 1;
  repeated ReviewIssue issues = 2;
  int32 score = 3;
}

message ReviewIssue {
  int32 line = 1;
  string severity = 2;
  string category = 3;
  string description = 4;
  string suggestion = 5;
}

enum ReviewMode {
  REVIEW_MODE_UNSPECIFIED = 0;
  REVIEW_MODE_QUICK = 1;
  REVIEW_MODE_DEEP = 2;
  REVIEW_MODE_SECURITY = 3;
  REVIEW_MODE_PERFORMANCE = 4;
}

message GenerateTestsRequest {
  string session_id = 1;
  string tenant_id = 2;
  string target_file = 3;
  string repository_path = 4;
  TestType test_type = 5;
}

message GenerateTestsResponse {
  string test_id = 1;
  repeated TestFile tests = 2;
  string coverage_info = 3;
}

message TestFile {
    string file_path = 1;
    string content = 2;
    TestType test_type = 3;
}

enum TestType {
  TEST_TYPE_UNSPECIFIED = 0;
  TEST_TYPE_UNIT = 1;
  TEST_TYPE_INTEGRATION = 2;
  TEST_TYPE_E2E = 3;
}

message ApplyPatchRequest {
  string session_id = 1;
  string tenant_id = 2;
  string patch_id = 3;
  string repository_path = 4;
  bool dry_run = 5;
}

message ApplyPatchResponse {
  bool success = 1;
  string message = 2;
  repeated AppliedFile applied_files = 3;
}

message AppliedFile {
  string file_path = 1;
  bool applied = 2;
  string error = 3;
}

service OpenCodeService {
  rpc CompleteCode(CompleteCodeRequest) returns (CompleteCodeResponse);
  rpc GenerateCode(GenerateCodeRequest) returns (GenerateCodeResponse);
  rpc RefactorCode(RefactorCodeRequest) returns (RefactorCodeResponse);
  rpc ExtractMethod(ExtractMethodRequest) returns (ExtractMethodResponse);
  rpc InlineFunction(InlineFunctionRequest) returns (InlineFunctionResponse);
  rpc RenameSymbol(RenameSymbolRequest) returns (RenameSymbolResponse);
  rpc MoveSymbol(MoveSymbolRequest) returns (MoveSymbolResponse);
  rpc EncapsulateField(EncapsulateFieldRequest) returns (EncapsulateFieldResponse);
  rpc PlanProject(PlanProjectRequest) returns (PlanProjectResponse);
  rpc GoToDefinition(GoToDefinitionRequest) returns (GoToDefinitionResponse);
  rpc FindReferences(FindReferencesRequest) returns (FindReferencesResponse);
  rpc Hover(HoverRequest) returns (HoverResponse);
  rpc DocumentSymbols(DocumentSymbolsRequest) returns (DocumentSymbolsResponse);
  rpc AnalyzeProject(AnalyzeProjectRequest) returns (AnalyzeProjectResponse);
  rpc QuickFix(QuickFixRequest) returns (QuickFixResponse);
  rpc GenerateDocumentation(GenerateDocumentationRequest) returns (GenerateDocumentationResponse);
  rpc GenerateImage(GenerateImageRequest) returns (GenerateImageResponse);
  rpc AnalyzeImage(AnalyzeImageRequest) returns (AnalyzeImageResponse);
  rpc AnalyzeChart(AnalyzeChartRequest) returns (AnalyzeChartResponse);
  rpc AnalyzeDocument(AnalyzeDocumentRequest) returns (AnalyzeDocumentResponse);
  rpc CacheAnalysis(CacheAnalysisRequest) returns (CacheAnalysisResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
  rpc FormatCode(FormatCodeRequest) returns (FormatCodeResponse);
  rpc WorkspaceSymbols(WorkspaceSymbolsRequest) returns (WorkspaceSymbolsResponse);
  rpc CodeLens(CodeLensRequest) returns (CodeLensResponse);
  rpc SemanticTokens(SemanticTokensRequest) returns (SemanticTokensResponse);
  rpc AnalyzeCodeSemantics(AnalyzeCodeSemanticsRequest) returns (AnalyzeCodeSemanticsResponse);
  rpc OptimizeCode(OptimizeCodeRequest) returns (OptimizeCodeResponse);
  rpc ReviewCodeQuality(ReviewCodeQualityRequest) returns (ReviewCodeQualityResponse);
  rpc CollaborativeEdit(CollaborativeEditRequest) returns (CollaborativeEditResponse);
  rpc BatchRefactor(BatchRefactorRequest) returns (BatchRefactorResponse);
  rpc IncrementalAnalyze(IncrementalAnalyzeRequest) returns (IncrementalAnalyzeResponse);
  rpc WarmupCache(WarmupCacheRequest) returns (WarmupCacheResponse);
  rpc GetPerformanceStats(GetPerformanceStatsRequest) returns (GetPerformanceStatsResponse);
  rpc SubscribeToChanges(SubscribeToChangesRequest) returns (stream SubscribeToChangesResponse);
  rpc GetActiveUsers(GetActiveUsersRequest) returns (GetActiveUsersResponse);
  rpc LockFile(LockFileRequest) returns (LockFileResponse);
  rpc ParseAst(ParseAstRequest) returns (ParseAstResponse);
  rpc InferTypes(InferTypesRequest) returns (InferTypesResponse);
  rpc ResolveSymbols(ResolveSymbolsRequest) returns (ResolveSymbolsResponse);
  rpc ValidateCode(ValidateCodeRequest) returns (ValidateCodeResponse);
  rpc EnforceStyle(EnforceStyleRequest) returns (EnforceStyleResponse);
  rpc DetectErrors(DetectErrorsRequest) returns (DetectErrorsResponse);
  rpc GoToTypeDefinition(GoToTypeDefinitionRequest) returns (GoToTypeDefinitionResponse);
  rpc GoToImplementation(GoToImplementationRequest) returns (GoToImplementationResponse);
  rpc FindImplementations(FindImplementationsRequest) returns (FindImplementationsResponse);
  rpc FindDerivedClasses(FindDerivedClassesRequest) returns (FindDerivedClassesResponse);
  rpc LogError(LogErrorRequest) returns (LogErrorResponse);
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);
  rpc SetLogLevel(SetLogLevelRequest) returns (SetLogLevelResponse);
  rpc DetectDesignPatterns(DetectDesignPatternsRequest) returns (DetectDesignPatternsResponse);
  rpc AnalyzeAntiPatterns(AnalyzeAntiPatternsRequest) returns (AnalyzeAntiPatternsResponse);
  rpc CrossFileRefactor(CrossFileRefactorRequest) returns (CrossFileRefactorResponse);
  rpc DetectCodeSmells(DetectCodeSmellsRequest) returns (DetectCodeSmellsResponse);
}

service PluginService {
  rpc LoadPlugin(LoadPluginRequest) returns (LoadPluginResponse);
  rpc UnloadPlugin(UnloadPluginRequest) returns (UnloadPluginResponse);
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  rpc ExecutePlugin(ExecutePluginRequest) returns (ExecutePluginResponse);
}

service UserPreferencesService {
  rpc GetPreferences(GetPreferencesRequest) returns (PreferencesResponse);
  rpc SetPreferences(SetPreferencesRequest) returns (PreferencesResponse);
}

service DistributedService {
  rpc DistributeTask(DistributeTaskRequest) returns (DistributeTaskResponse);
  rpc GetClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
}

message CompleteCodeRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  int32 cursor_position = 5;
  string language = 6;
  int32 max_results = 7;
}

message CompleteCodeResponse {
  repeated CodeCompletion completions = 1;
  string error = 2;
}

message CodeCompletion {
  string text = 1;
  string detail = 2;
  string kind = 3;
  int32 start_position = 4;
  int32 end_position = 5;
  float score = 6;
}

message GenerateCodeRequest {
  string session_id = 1;
  string tenant_id = 2;
  string prompt = 3;
  string language = 4;
  string framework = 5;
  bool include_tests = 6;
}

message GenerateCodeResponse {
  string generated_code = 1;
  string explanation = 2;
  repeated CodeFile files = 3;
  string error = 4;
}

message CodeFile {
  string file_path = 1;
  string content = 2;
}

message RefactorCodeRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  string refactor_type = 5;
  string target_method = 6;
}

message RefactorCodeResponse {
  string refactored_code = 1;
  string diff = 2;
  repeated RefactorOperation operations = 3;
  string error = 4;
}

message RefactorOperation {
  string description = 1;
  string location = 2;
  string change_type = 3;
}

message PlanProjectRequest {
  string session_id = 1;
  string tenant_id = 2;
  string project_description = 3;
  string tech_stack = 4;
  bool include_docs = 5;
}

message PlanProjectResponse {
  string plan_id = 1;
  string architecture = 2;
  repeated ProjectModule modules = 3;
  string timeline = 4;
  string error = 5;
}

message ProjectModule {
  string name = 1;
  string description = 2;
  string responsibility = 3;
  repeated string dependencies = 4;
}

message GoToDefinitionRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  int32 line = 4;
  int32 character = 5;
}

message GoToDefinitionResponse {
  repeated Location locations = 1;
  string error = 2;
}

message FindReferencesRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  int32 line = 4;
  int32 character = 5;
  bool include_declaration = 6;
}

message FindReferencesResponse {
  repeated Reference references = 1;
  string error = 2;
}

message HoverRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  int32 line = 4;
  int32 character = 5;
}

message HoverResponse {
  string contents = 1;
  string error = 2;
}

message DocumentSymbolsRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
}

message DocumentSymbolsResponse {
  repeated SymbolInformation symbols = 1;
  string error = 2;
}

message Location {
  string file_path = 1;
  int32 line = 2;
  int32 character = 3;
  int32 end_line = 4;
  int32 end_character = 5;
}

message Reference {
  Location location = 1;
  string role = 2;
}

message SymbolInformation {
  string name = 1;
  string kind = 2;
  Location location = 3;
  string container_name = 4;
}

message AnalyzeProjectRequest {
  string session_id = 1;
  string tenant_id = 2;
  string project_path = 3;
  bool include_dependencies = 4;
}

message AnalyzeProjectResponse {
  string project_id = 1;
  ProjectAnalysis analysis = 2;
  repeated FileInfo files = 3;
  DependencyGraph dependency_graph = 4;
  string error = 5;
}

message ProjectAnalysis {
  string name = 1;
  string description = 2;
  string language = 3;
  string framework = 4;
  int32 file_count = 5;
  int32 line_count = 6;
  repeated string dependencies = 7;
}

message FileInfo {
  string file_path = 1;
  string language = 2;
  int32 line_count = 3;
  int32 symbol_count = 4;
  repeated string imports = 5;
}

message DependencyGraph {
  repeated DependencyNode nodes = 1;
  repeated DependencyEdge edges = 2;
}

message DependencyNode {
  string id = 1;
  string name = 2;
  string type = 3;
  string file_path = 4;
}

message DependencyEdge {
  string from = 1;
  string to = 2;
  string type = 3;
}

message QuickFixRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  int32 line = 5;
  int32 character = 6;
  string issue_type = 7;
}

message QuickFixResponse {
  repeated Fix suggestions = 1;
  string error = 2;
}

message Fix {
  string id = 1;
  string description = 2;
  string fix_type = 3;
  string code_change = 4;
  repeated Location locations = 5;
  bool is_safe = 6;
}

message GenerateDocumentationRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  bool include_comments = 5;
  bool include_examples = 6;
}

message GenerateDocumentationResponse {
  string documentation = 1;
  repeated DocComment comments = 2;
  string error = 3;
}

message DocComment {
  string symbol_name = 1;
  string documentation = 2;
  Location location = 3;
}

message ExtractMethodRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  int32 start_line = 5;
  int32 end_line = 6;
  string method_name = 7;
}

message ExtractMethodResponse {
  string refactored_code = 1;
  string new_method = 2;
  string diff = 3;
  bool success = 4;
  string error = 5;
}

message InlineFunctionRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  string function_name = 5;
}

message InlineFunctionResponse {
  string refactored_code = 1;
  string diff = 2;
  bool success = 3;
  string error = 4;
}

message RenameSymbolRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  string old_name = 5;
  string new_name = 6;
  bool rename_all_occurrences = 7;
}

message RenameSymbolResponse {
  string updated_code = 1;
  int32 renamed_count = 2;
  repeated Location locations = 3;
  bool success = 4;
  string error = 5;
}

message MoveSymbolRequest {
  string session_id = 1;
  string tenant_id = 2;
  string source_file = 3;
  string target_file = 4;
  string symbol_name = 5;
}

message MoveSymbolResponse {
  string updated_source = 1;
  string updated_target = 2;
  bool success = 3;
  string error = 4;
}

message EncapsulateFieldRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  string struct_name = 5;
  string field_name = 6;
  bool generate_getter = 7;
  bool generate_setter = 8;
}

message EncapsulateFieldResponse {
  string refactored_code = 1;
  string getter_method = 2;
  string setter_method = 3;
  bool success = 4;
  string error = 5;
}

message AnalyzeDocumentRequest {
  string session_id = 1;
  string tenant_id = 2;
  string document_text = 3;
  string document_url = 4;
  string analysis_type = 5;
}

message AnalyzeDocumentResponse {
  string summary = 1;
  repeated DocumentSection sections = 2;
  string key_points = 3;
  string error = 4;
}

message DocumentSection {
  string title = 1;
  string content = 2;
  int32 start_index = 3;
  int32 end_index = 4;
}

message FormatCodeRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  string language = 5;
  string style = 6;
}

message FormatCodeResponse {
  string formatted_code = 1;
  bool success = 2;
  string error = 3;
}

message WorkspaceSymbolsRequest {
  string session_id = 1;
  string tenant_id = 2;
  string query = 3;
  repeated string file_paths = 4;
}

message WorkspaceSymbol {
  string name = 1;
  string kind = 2;
  Location location = 3;
  string container_name = 4;
}

message WorkspaceSymbolsResponse {
  repeated WorkspaceSymbol symbols = 1;
  string error = 2;
}

message CodeLensRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
}

message CodeLens {
  Location location = 1;
  string command = 2;
  string title = 3;
  map<string, string> arguments = 4;
}

message CodeLensResponse {
  repeated CodeLens lenses = 1;
  string error = 2;
}

message SemanticTokensRequest {
  string session_id = 1;
  string tenant_id = 2;
  string file_path = 3;
  string code = 4;
  int32 start_line = 5;
  int32 end_line = 6;
}

message SemanticToken {
  int32 line = 1;
  int32 character = 2;
  int32 length = 3;
  string token_type = 4;
  repeated string token_modifiers = 5;
}

message SemanticTokensResponse {
  repeated SemanticToken tokens = 1;
  string error = 2;
}

message UserPreferences {
  string user_id = 1;
  string theme = 2;
  string font_family = 3;
  int32 font_size = 4;
