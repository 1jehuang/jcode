apiVersion: v1
kind: ServiceAccount
metadata:
  name: carpai-operator
  namespace: carpai-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carpai-operator-role
rules:
  - apiGroups: ["carpai.io"]
    resources: ["carpaiclusters", "carpaiclusters/status", "carpaiclusters/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carpai-operator-binding
subjects:
  - kind: ServiceAccount
    name: carpai-operator
    namespace: carpai-system
roleRef:
  kind: ClusterRole
  name: carpai-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carpai-operator
  namespace: carpai-system
  labels:
    app.kubernetes.io/name: carpai-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: carpai-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carpai-operator
    spec:
      serviceAccountName: carpai-operator
      containers:
        - name: operator
          image: python:3.11-slim
          command: ["pip", "install", "kopf", "kubernetes", "&&", "kopf", "run", "/opt/operator/controller.py"]
          args:
            - --verbose
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: operator-code
              mountPath: /opt/operator
      volumes:
        - name: operator-code
          configMap:
            name: carpai-operator-code
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carpai-operator-code
  namespace: carpai-system
data:
  controller.py: |
    # Operator code will be mounted here
    # See k8s/operator/controller.py for full implementation
