# ============================================================
# OpenTelemetry Collector 配置
# 接收 JCode 的 OTLP Metrics/Traces/Logs 并导出到 Prometheus
# ============================================================
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  attributes:
    actions:
      - key: service.name
        value: jcode-server
        action: insert

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: jcode
    send_timestamps: true
    metric_expiration: 180m
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [prometheus, debug]
