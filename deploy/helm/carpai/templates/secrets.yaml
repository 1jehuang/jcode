{{- if not (lookup "v1" "Secret" .Values.global.namespace "carpai-secrets") }}
apiVersion: v1
kind: Secret
metadata:
  name: carpai-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "carpai.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ printf "postgresql://%s:%s@%s-postgres:%d/%s" .Values.postgresql.user (randAlphaNum 24) (include "carpai.fullname" .) (int .Values.postgresql.port) .Values.postgresql.database | quote }}
  jwt-secret: {{ randAlphaNum 64 | quote }}
  api-key: {{ randAlphaNum 32 | quote }}
{{- end }}
